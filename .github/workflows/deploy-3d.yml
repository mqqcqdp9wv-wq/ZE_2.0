name: Deploy 3D Simulator to Yandex Object Storage

on:
  push:
    branches:
      - main
    paths:
      - '3d/**'
      - '.github/workflows/deploy-3d.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 3d
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 3d/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npx next build

      - name: Sync to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync ./out s3://3d.ze-studio48.ru \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --no-progress \
            --cache-control "public, max-age=300"

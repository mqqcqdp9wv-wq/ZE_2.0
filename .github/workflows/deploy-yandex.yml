name: Deploy to Yandex Object Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create clean URLs
        run: |
          find . -name '*.html' ! -name 'index.html' ! -name '404.html' ! -path './.git/*' | while read f; do
            target="${f%.html}"
            cp "$f" "$target"
          done

      - name: Deploy to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync . s3://ze-studio48.ru \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --no-progress \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "vercel.json" \
            --exclude "node_modules/*" \
            --exclude "api/*"

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      width: 960px;
      background: #fff;
      border-radius: 20px;
      padding: 56px 64px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .tag {
      background: #e8f5f0;
      color: #2d8f6f;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 6px;
    }

    .date {
      font-size: 16px;
      color: #aaa;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      line-height: 1.2;
      color: #111;
      margin-bottom: 20px;
    }

    .desc {
      font-size: 18px;
      line-height: 1.6;
      color: #888;
      margin-bottom: 32px;
    }

    .cta {
      font-size: 17px;
      font-weight: 600;
      color: #2d8f6f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="meta">
      <span class="tag">Выбор материала</span>
      <span class="date">Март 2026</span>
    </div>
    <h1>Как мы выбирали плёнку,<br>когда доверять стало некому</h1>
    <p class="desc">Рынок тонировки в России — территория без правил. Как проверить<br>любой бренд по пяти независимым источникам за 15 минут.<br>Метод, который работает.</p>
    <span class="cta">Читать статью →</span>
  </div>
</body>
</html>

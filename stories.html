<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Stories — ze.studio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,500,600,700,800,900&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    /* На мобиле — полный экран */
    @media (max-width: 480px) {
      body {
        padding: 0;
        background: #000;
      }
    }

    /* --- Story Canvas --- */
    .story-canvas {
      width: 375px;
      height: 667px;
      position: relative;
      overflow: hidden;
      background: #fff;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .story-canvas {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }
    }

    /* --- Safe Zones (подсказки) --- */
    .safe-zone {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .safe-zone-top {
      top: 0;
      height: 14%;
      background: rgba(255, 0, 0, 0.08);
      border-bottom: 1px dashed rgba(255, 0, 0, 0.3);
    }

    .safe-zone-bottom {
      bottom: 0;
      height: 12%;
      background: rgba(255, 0, 0, 0.08);
      border-top: 1px dashed rgba(255, 0, 0, 0.3);
    }

    .safe-zone-label {
      position: absolute;
      font-size: 9px;
      font-weight: 600;
      color: rgba(255, 0, 0, 0.5);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .safe-zone-top .safe-zone-label {
      bottom: 4px;
      right: 8px;
    }

    .safe-zone-bottom .safe-zone-label {
      top: 4px;
      right: 8px;
    }

    /* Скрытие подсказок */
    .story-canvas.clean .safe-zone,
    .story-canvas.clean .guide-grid {
      opacity: 0 !important;
    }

    /* --- Guide Grid (сетка) --- */
    .guide-grid {
      position: absolute;
      inset: 0;
      z-index: 99;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .guide-grid::before,
    .guide-grid::after {
      content: '';
      position: absolute;
      background: rgba(35, 165, 146, 0.1);
    }

    .guide-grid::before {
      /* Вертикальные направляющие — отступы 24px */
      left: 24px;
      top: 0;
      width: 1px;
      height: 100%;
      box-shadow: calc(100% - 49px) 0 0 0 rgba(35, 165, 146, 0.1);
    }

    .guide-grid::after {
      /* Центральная линия */
      left: 50%;
      top: 14%;
      width: 1px;
      height: 74%;
      background: rgba(35, 165, 146, 0.06);
    }

    /* --- Content Area --- */
    .story-content {
      position: absolute;
      top: 14%;
      bottom: 12%;
      left: 0;
      right: 0;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    /* --- Logo --- */
    .story-logo {
      position: absolute;
      bottom: 13%;
      left: 24px;
      font-size: 11px;
      font-weight: 700;
      color: #ccc;
      letter-spacing: 0.5px;
      z-index: 50;
    }

    .story-logo.dark {
      color: #555;
    }

    /* --- Placeholder (пустое состояние) --- */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ccc;
      gap: 12px;
    }

    .placeholder-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .placeholder-text {
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      line-height: 1.6;
    }

    .placeholder-hint {
      font-size: 11px;
      color: #ddd;
      margin-top: 4px;
    }

    /* --- Controls (панель управления — только десктоп) --- */
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 375px;
    }

    @media (max-width: 480px) {
      .controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.9);
        padding: 12px;
        margin: 0;
        max-width: none;
        z-index: 200;
        backdrop-filter: blur(10px);
      }
    }

    .ctrl-btn {
      padding: 8px 16px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #fff;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover {
      background: #333;
      border-color: #23a592;
    }

    .ctrl-btn.active {
      background: #23a592;
      border-color: #23a592;
    }

    /* --- Themes --- */

    /* Светлая (по умолчанию) */
    .story-canvas.theme-light {
      background: #ffffff;
      color: #1a1a1a;
    }

    /* Тёмная */
    .story-canvas.theme-dark {
      background: #1a1a1a;
      color: #ffffff;
    }

    .story-canvas.theme-dark .story-logo { color: #666; }
    .story-canvas.theme-dark .placeholder-text { color: #555; }
    .story-canvas.theme-dark .placeholder-icon { color: #333; }

    /* Зелёная */
    .story-canvas.theme-green {
      background: #23a592;
      color: #ffffff;
    }

    .story-canvas.theme-green .story-logo { color: rgba(255,255,255,0.5); }
    .story-canvas.theme-green .placeholder-text { color: rgba(255,255,255,0.6); }

    /* --- Info (подпись под canvas на десктопе) --- */
    .info {
      margin-top: 16px;
      font-size: 11px;
      color: #666;
      text-align: center;
      max-width: 375px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Story Canvas -->
  <div class="story-canvas theme-light" id="canvas">

    <!-- Подсказки безопасных зон -->
    <div class="safe-zone safe-zone-top">
      <span class="safe-zone-label">↑ VK / Insta UI</span>
    </div>
    <div class="safe-zone safe-zone-bottom">
      <span class="safe-zone-label">↓ Кнопки / ответ</span>
    </div>

    <!-- Сетка направляющих -->
    <div class="guide-grid"></div>

    <!-- Контент -->
    <div class="story-content">
      <div class="placeholder">
        <div class="placeholder-icon">✦</div>
        <div class="placeholder-text">
          Скажи Клоду тему —<br>он разместит контент здесь
        </div>
        <div class="placeholder-hint">
          375 × 667 · безопасная зона · Montserrat
        </div>
      </div>
    </div>

    <!-- Логотип -->
    <div class="story-logo dark">ze.studio</div>

  </div>

  <!-- Управление -->
  <div class="controls">
    <button class="ctrl-btn" onclick="toggleGuides()">Подсказки вкл/выкл</button>
    <button class="ctrl-btn" onclick="setTheme('light')">Светлая</button>
    <button class="ctrl-btn" onclick="setTheme('dark')">Тёмная</button>
    <button class="ctrl-btn" onclick="setTheme('green')">Зелёная</button>
  </div>

  <div class="info">
    Красные зоны — здесь UI ВКонтакте/Instagram перекрывает контент.<br>
    Нажми «Подсказки вкл/выкл» перед скриншотом.
  </div>

  <script>
    var canvas = document.getElementById('canvas');

    function toggleGuides() {
      canvas.classList.toggle('clean');
    }

    function setTheme(theme) {
      canvas.className = canvas.className.replace(/theme-\w+/g, '');
      canvas.classList.add('theme-' + theme);

      // Обновить цвет логотипа
      var logo = canvas.querySelector('.story-logo');
      if (theme === 'light') {
        logo.classList.add('dark');
      } else {
        logo.classList.remove('dark');
      }
    }
  </script>

</body>
</html>

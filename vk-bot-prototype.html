  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #edeef0;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .phone {
      width: 390px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
      height: 780px;
      position: relative;
    }

    .header {
      background: #fff;
      padding: 16px 20px;
      border-bottom: 1px solid #e7e8ec;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #23a592, #1a7a6d);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 14px;
    }

    .header-info { flex: 1; }
    .header-name { font-weight: 600; font-size: 15px; color: #222; }
    .header-status { font-size: 12px; color: #818c99; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #edeef0;
    }

    .msg-bot {
      max-width: 85%;
      background: #fff;
      border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.45;
      color: #222;
      white-space: pre-line;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }

    .msg-user {
      max-width: 75%;
      background: #cce5ff;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.4;
      color: #222;
      align-self: flex-end;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }

    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 85%;
    }

    .kb-row {
      display: flex;
      gap: 6px;
    }

    .kb-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .kb-btn:hover { filter: brightness(0.92); transform: scale(0.98); }
    .kb-btn:active { transform: scale(0.95); }

    .kb-btn.primary { background: #5181b8; color: #fff; }
    .kb-btn.secondary { background: #e5ebf1; color: #55677d; }
    .kb-btn.positive { background: #4bb34b; color: #fff; }
    .kb-btn.negative { background: #e64646; color: #fff; }
    .kb-btn.link { background: #fff; color: #5181b8; border: 1px solid #d3d9de; }

    .breadcrumb {
      background: #fff;
      padding: 10px 16px;
      font-size: 11px;
      color: #818c99;
      border-top: 1px solid #e7e8ec;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .breadcrumb span { cursor: pointer; color: #5181b8; }
    .breadcrumb span:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #ccc; cursor: default; }
    .breadcrumb .current { color: #818c99; cursor: default; }

    .typing {
      font-size: 12px;
      color: #818c99;
      padding: 4px 0;
      display: none;
    }

    .typing.show { display: block; }

    .counter {
      position: absolute;
      top: 16px; right: 20px;
      font-size: 11px;
      color: #818c99;
      background: #f0f2f5;
      padding: 2px 8px;
      border-radius: 8px;
    }

    /* Фиксированная клавиатура — висит внизу чата всегда */
    .fixed-keyboard {
      background: #fff;
      padding: 8px 12px;
      border-top: 1px solid #e7e8ec;
      flex-shrink: 0;
    }

    .fixed-keyboard button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #f0f2f5;
      color: #55677d;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .fixed-keyboard button:hover { filter: brightness(0.93); }
    .fixed-keyboard button:active { transform: scale(0.97); }
  </style>
</head>

// ─── ENGINE ─────────────────────────────────

const chat = document.getElementById('chat');
const breadcrumb = document.getElementById('breadcrumb');
const stepCounter = document.getElementById('stepCounter');
let step = 0;

function renderBreadcrumb(pathArr) {
  if (!pathArr) { breadcrumb.innerHTML = ''; return; }
  breadcrumb.innerHTML = pathArr.map((p, i) => {
    if (i === pathArr.length - 1) return `<span class="current">${p}</span>`;
    return `<span>${p}</span><span class="sep">›</span>`;
  }).join('');
}

function navigate(targetId) {
  if (targetId === '_call' || targetId === '_maps') {
    alert(targetId === '_call' ? 'Звонок: +7 (915) 858-21-15' : 'Открыть Яндекс.Карты');
    return;
  }

  const screen = screens[targetId];
  if (!screen) return;

  step++;
  stepCounter.textContent = `шаг ${step}`;

  // user "tap" bubble
  const userMsg = document.createElement('div');
  userMsg.className = 'msg-user';
  userMsg.textContent = event?.target?.textContent || '▶';
  chat.appendChild(userMsg);

  // bot message
  setTimeout(() => {
    const botMsg = document.createElement('div');
    botMsg.className = 'msg-bot';
    botMsg.textContent = screen.text;
    chat.appendChild(botMsg);

    // keyboard
    if (screen.buttons) {
      const kb = document.createElement('div');
      kb.className = 'keyboard';
      screen.buttons.forEach(row => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'kb-row';
        row.forEach(btn => {
          const b = document.createElement('button');
          b.className = `kb-btn ${btn.color || 'secondary'}`;
          b.textContent = btn.label;
          b.onclick = (e) => navigate(btn.target);
          rowDiv.appendChild(b);
        });
        kb.appendChild(rowDiv);
      });
      chat.appendChild(kb);
    }

    renderBreadcrumb(screen.path);
    chat.scrollTop = chat.scrollHeight;
  }, 300);
}

// init
(function() {
  const screen = screens.welcome;
  const botMsg = document.createElement('div');
  botMsg.className = 'msg-bot';
  botMsg.textContent = screen.text;
  chat.appendChild(botMsg);

  const kb = document.createElement('div');
  kb.className = 'keyboard';
  screen.buttons.forEach(row => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    row.forEach(btn => {
      const b = document.createElement('button');
      b.className = `kb-btn ${btn.color || 'secondary'}`;
      b.textContent = btn.label;
      b.onclick = (e) => navigate(btn.target);
      rowDiv.appendChild(b);
    });
    kb.appendChild(rowDiv);
  });
  chat.appendChild(kb);
  renderBreadcrumb(screen.path);
})();
</script>
